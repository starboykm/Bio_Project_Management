services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bio_pm}
      POSTGRES_USER: ${POSTGRES_USER:-bio_pm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bio_pm_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bio_pm} -d ${POSTGRES_DB:-bio_pm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER:-bio_pm}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-bio_pm_password}
      DATABASE_NAME: ${POSTGRES_DB:-bio_pm}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PORT: 3333
      NODE_ENV: production
    ports:
      - "${BACKEND_PORT:-3333}:3333"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: /api
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
