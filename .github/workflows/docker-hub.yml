name: Publish Docker Hub Images

on:
  workflow_dispatch:
    inputs:
      version:
        description: Docker image version tag
        required: true
        default: 0.1.1

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bio-project-management-backend:${{ inputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/bio-project-management-backend:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/bio-project-management-frontend:${{ inputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/bio-project-management-frontend:latest
